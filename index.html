<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GYRO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/componentes/Header.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <link rel="icon" href="/gyro-favicon.svg" type="image/svg+xml">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body{
        /* overflow: hidden; */
      }
      #render{
        max-width: 900px;
        margin: 0 auto;
      }

      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background: #16171d;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      #splash.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #splash .splash-logo {
        display: flex;
        align-items: center;
        line-height: 1;
      }
      #splash .splash-logo .splash-logo-full {
        width: 4.35em;
        height: 0.98em;
        display: block;
        transform: translateY(0.01em);
      }
      #splash .splash-bar {
        width: 120px;
        height: 3px;
        border-radius: 99px;
        background: #2e303a;
        overflow: hidden;
      }
      #splash .splash-bar::after {
        content: '';
        display: block;
        height: 100%;
        width: 0%;
        background: #aa3bff;
        border-radius: 99px;
        animation: splash-progress 1.4s ease forwards;
      }
      @keyframes splash-progress {
        to { width: 100%; }
      }
    </style>
</head>
<body>
    <div id="splash">
      <div class="splash-logo"><img class="splash-logo-full" src="/logo-gyro-road.svg" alt="GYRO" /></div>
      <div class="splash-bar"></div>
    </div>
    <div id="render"></div>
    <script type="module" src="src/main.js"></script>
</body>
</html>
